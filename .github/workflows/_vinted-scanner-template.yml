name: Vinted Scanner Template

on:
  workflow_call:
    secrets:
      vinted_config:
        required: true

permissions:
  contents: write

concurrency:
  group: vinted-scanner-master
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create Config.py
        run: |
          cat > Config.py <<'PYCONFIG'
          ${{ secrets.vinted_config }}
          PYCONFIG

      - name: Run scanner
        run: python3 vinted_scanner.py

      - name: Commit updated seen items
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          cp vinted_items.txt /tmp/vinted_items_new.txt
      
          git fetch origin master
          git checkout origin/master -- vinted_items.txt || touch vinted_items.txt
      
          cat vinted_items.txt /tmp/vinted_items_new.txt | sort -u > vinted_items_merged.txt
          mv vinted_items_merged.txt vinted_items.txt
      
          git add vinted_items.txt
      
          if git diff --cached --quiet; then
            echo "No new items to commit."
          else
            git commit -m "Update Vinted seen items."
            git push origin HEAD:master
          fi
