name: Vinted Scanner Template

on:
  workflow_call:
    secrets:
      vinted_config:
        required: true

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create Config.py
        run: |
          cat > Config.py <<'PYCONFIG'
          ${{ secrets.vinted_config }}
          PYCONFIG

      - name: Run scanner
        run: python3 vinted_scanner.py

      - name: Commit updated seen items
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add vinted_items.txt

          if git diff --cached --quiet; then
            echo "No new items to commit."
          else
            git commit -m "Update Vinted seen items."
            git pull --rebase origin master
            git push origin HEAD:master
          fi
